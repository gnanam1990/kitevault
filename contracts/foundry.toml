[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
kite_mainnet = "https://rpc.gokite.ai"
kite_testnet = "https://rpc-testnet.gokite.ai"

[etherscan]
kite_testnet = { key = "${KITESCAN_API_KEY}", url = "https://testnet.kitescan.ai/api" }
kite_mainnet = { key = "${KITESCAN_API_KEY}", url = "https://kitescan.ai/api" }
